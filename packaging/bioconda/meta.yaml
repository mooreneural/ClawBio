{% set name = "clawbio" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # Must match the sha256 of the sdist actually uploaded to PyPI. Python builds
  # are not byte-reproducible, so re-verify after any rebuild:
  #   shasum -a 256 dist/clawbio-0.5.1.tar.gz
  # or pull the canonical hash from PyPI after publishing:
  #   curl -s https://pypi.org/pypi/clawbio/0.5.1/json | python3 -c "import json,sys;print([u['digests']['sha256'] for u in json.load(sys.stdin)['urls'] if u['packagetype']=='sdist'][0])"
  sha256: 71e7dacf45383974504a716811d83d6d6122988ab4c71b37f8db7133ea06bf6f

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - clawbio = clawbio.cli:main

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - biopython >=1.82
    - conda-lock >=2.0
    - google-auth >=2,<3
    - google-cloud-bigquery >=3,<4
    - matplotlib-base >=3.7
    - numpy >=1.24
    - openai >=1.0
    - opentelemetry-sdk >=1.20,<2
    - pandas >=2.0
    - pyyaml >=6.0
    - pydeseq2 >=0.4
    - rocrate >=0.15.0
    - scikit-learn >=1.3

test:
  imports:
    - clawbio
    - clawbio.cli
  commands:
    - clawbio list

about:
  home: https://clawbio.ai
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "The first bioinformatics-native AI agent skill library. Local-first, reproducible, built on OpenClaw."
  dev_url: https://github.com/ClawBio/ClawBio
  doc_url: https://clawbio.github.io/ClawBio/

extra:
  recipe-maintainers:
    - manuelcorpas
